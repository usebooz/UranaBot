name: Deploy Uranabot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: usebooz/uranabot

jobs:
  # --- 1) TEST ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

  # --- 2) VALIDATE DEPLOY CONFIG ---
  validate-deploy-config:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Validate required secrets and variables
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SPORTS_API_URL: ${{ vars.SPORTS_API_URL }}
          SPORTS_API_PATH: ${{ vars.SPORTS_API_PATH }}
          SPORTS_TOURNAMENT_RPL: ${{ vars.SPORTS_TOURNAMENT_RPL }}
          TELEGRAM_URL: ${{ vars.TELEGRAM_URL }}
          URANAWEB_APP_URL: ${{ vars.URANAWEB_APP_URL }}
          URANAWEB_APP_PATH: ${{ vars.URANAWEB_APP_PATH }}
          URANA_API_URL: ${{ vars.URANA_API_URL }}
          URANA_API_PATH: ${{ vars.URANA_API_PATH }}
        run: |
          missing=0

          for name in \
            BOT_TOKEN HOST USERNAME SSH_PRIVATE_KEY \
            SPORTS_API_URL SPORTS_API_PATH SPORTS_TOURNAMENT_RPL \
            TELEGRAM_URL URANAWEB_APP_URL URANAWEB_APP_PATH \
            URANA_API_URL URANA_API_PATH
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deployment configuration::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

  # --- 3) BUILD & PUSH (GHCR) ---
  build-and-push:
    needs: [test, validate-deploy-config]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # --- 4) DEPLOY (pull image on server with compose) ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from vars & secrets
        run: |
          cat > .env <<'EOF'
          URANABOT_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          NODE_ENV=production
          LOG_LEVEL=info
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}

          SPORTS_API_URL=${{ vars.SPORTS_API_URL }}
          SPORTS_API_PATH=${{ vars.SPORTS_API_PATH }}
          SPORTS_TOURNAMENT_RPL=${{ vars.SPORTS_TOURNAMENT_RPL }}

          TELEGRAM_URL=${{ vars.TELEGRAM_URL }}

          URANAWEB_APP_URL=${{ vars.URANAWEB_APP_URL }}
          URANAWEB_APP_PATH=${{ vars.URANAWEB_APP_PATH }}

          URANA_API_URL=${{ vars.URANA_API_URL }}
          URANA_API_PATH=${{ vars.URANA_API_PATH }}
          EOF

      - name: Prep SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Prepare deploy dir on server
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
        run: |
          ssh -i ~/.ssh/id_rsa ${USERNAME}@${HOST} \
            'sudo mkdir -p /opt/uranaspace && sudo chown $(whoami):$(whoami) /opt/uranaspace'

      - name: Sync deployment files to VPS
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_rsa" \
            docker-compose.yml Caddyfile ${USERNAME}@${HOST}:/opt/uranaspace/

          rsync -az -e "ssh -i ~/.ssh/id_rsa" .env ${USERNAME}@${HOST}:/opt/uranaspace/.env

      - name: Compose up (pull image, zero-downtime)
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/id_rsa ${USERNAME}@${HOST} \
            "docker login ${{ env.REGISTRY }} -u ${GHCR_USERNAME} --password-stdin"

          ssh -i ~/.ssh/id_rsa ${USERNAME}@${HOST} <<'EOSSH'
            set -euo pipefail
            cd /opt/uranaspace

            docker compose pull
            docker compose up -d --remove-orphans

            docker compose ps
            docker compose logs --tail=50 || true

            docker image prune -f || true
          EOSSH

  # --- 5) HEALTH CHECK ---
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Health probe over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/uranaspace

            echo "=== ps ==="
            docker compose ps -a

            echo "=== wait app ==="
            sleep 20

            echo "=== recent logs ==="
            docker compose logs --tail=60 || true

            echo "=== container health ==="
            
            uranabot_health=$(docker inspect -f '{{.State.Health.Status}}' uranabot 2>/dev/null || echo "unhealthy")
            if [ "$uranabot_health" != "healthy" ]; then
              echo "❌ uranabot health status: $uranabot_health"
              exit 1
            fi

            uranaapi_health=$(docker inspect -f '{{.State.Health.Status}}' uranaapi 2>/dev/null || echo "unhealthy")
            if [ "$uranaapi_health" != "healthy" ]; then
              echo "❌ uranaapi health status: $uranaapi_health"
              exit 1
            fi

            echo "✅ OK"
